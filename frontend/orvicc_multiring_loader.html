<!DOCTYPE html>
<html>
<head>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#13131A;display:flex;align-items:center;justify-content:center;min-height:400px;font-family:'Inter','Helvetica Neue',sans-serif}
</style>
</head>
<body>
<canvas id="c" width="680" height="380"></canvas>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const cx=200,cy=190;
let t=0;

function easeOut(t){return 1-Math.pow(1-t,3)}

function drawHex(r,p,alpha,lw){
  const pts=[];
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
  const drawn=p*6;
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<=6;i++){
    const idx=i%6,seg=Math.min(1,drawn-i+1);
    if(seg<=0)break;
    const pr=pts[i-1],cr=pts[idx];
    ctx.lineTo(pr[0]+(cr[0]-pr[0])*seg,pr[1]+(cr[1]-pr[1])*seg);
  }
  ctx.strokeStyle=`rgba(140,145,180,${alpha})`;ctx.lineWidth=lw;ctx.stroke();
}

function draw(){
  ctx.clearRect(0,0,680,380);
  ctx.fillStyle='#13131A';ctx.fillRect(0,0,680,380);
  const f=t*1.6;

  // 7 concentric hexagons, each staggered by 18 frames
  const rings=[14,22,30,40,52,64,78];
  const alphas=[0.9,0.75,0.62,0.50,0.38,0.26,0.16];
  const lws=[1.8,1.5,1.4,1.3,1.2,1.1,1.0];

  rings.forEach((r,i)=>{
    const start=i*18;
    if(f>=start){
      const p=easeOut(Math.min(1,(f-start)/50));
      drawHex(r,p,alphas[i]*p,lws[i]);
    }
  });

  // node arms (after outer hex)
  if(f>=130){
    const p=easeOut(Math.min(1,(f-130)/40));
    for(let i=0;i<6;i++){
      const a=Math.PI/180*(60*i-30),vx=Math.cos(a),vy=Math.sin(a);
      const x1=cx+78*vx,y1=cy+78*vy;
      const x2=x1+20*vx*p,y2=y1+20*vy*p;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
      ctx.strokeStyle=`rgba(160,165,200,${p*0.7})`;ctx.lineWidth=1;ctx.stroke();
      if(p>0.6){
        const np=(p-0.6)/0.4;
        ctx.beginPath();ctx.arc(x2,y2,5*np,0,Math.PI*2);
        ctx.fillStyle=`rgba(160,165,200,${np*0.85})`;ctx.fill();
        ctx.beginPath();ctx.arc(x2,y2,5*np,0,Math.PI*2);
        ctx.strokeStyle=`rgba(100,105,140,${np})`;ctx.lineWidth=1;ctx.stroke();
        // inner dot
        ctx.beginPath();ctx.arc(x2,y2,2*np,0,Math.PI*2);
        ctx.fillStyle=`rgba(220,225,255,${np*0.9})`;ctx.fill();
      }
    }
  }

  // core white eye â€” always on top
  if(f>=10){
    const p=easeOut(Math.min(1,(f-10)/30));
    // dark bg circle
    ctx.beginPath();ctx.arc(cx,cy,12,0,Math.PI*2);
    ctx.fillStyle='#111120';ctx.fill();
    // outer glow ring
    ctx.beginPath();ctx.arc(cx,cy,10,0,Math.PI*2);
    ctx.strokeStyle=`rgba(160,165,200,${p*0.5})`;ctx.lineWidth=1;ctx.stroke();
    // white fill
    ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);
    ctx.fillStyle=`rgba(220,225,255,${p*0.85})`;ctx.fill();
    // bright center
    ctx.beginPath();ctx.arc(cx,cy,3.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${p})`;ctx.fill();
    // specular
    ctx.beginPath();ctx.arc(cx-1.5,cy-1.5,1.2,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,0.7)`;ctx.fill();
  }

  // wordmark
  if(f>=195){
    const p=easeOut(Math.min(1,(f-195)/50));
    const word='orvicc',chars=Math.floor(p*word.length);
    ctx.font='600 52px Inter,Helvetica Neue,sans-serif';
    ctx.fillStyle=`rgba(232,232,245,${p})`;
    ctx.fillText(word.slice(0,chars),320,cy+15);
    if(chars<word.length){
      const mw=ctx.measureText(word.slice(0,chars)).width;
      ctx.fillStyle=`rgba(232,232,245,${Math.sin(f*0.45)>0?0.8:0})`;
      ctx.fillRect(322+mw,cy-30,2,38);
    }
  }
  // automation tag
  if(f>=242){
    const p=easeOut(Math.min(1,(f-242)/35));
    ctx.font='400 11px Inter,Helvetica Neue,sans-serif';
    ctx.fillStyle=`rgba(110,112,145,${p})`;
    ctx.fillText('AUTOMATION',325,cy+42);
  }

  // idle outer pulse
  if(f>310){
    const pulse=Math.sin((f-310)*0.055);
    ctx.beginPath();ctx.arc(cx,cy,82+pulse*4,0,Math.PI*2);
    ctx.strokeStyle=`rgba(120,125,160,${0.08+pulse*0.04})`;
    ctx.lineWidth=1;ctx.stroke();
  }

  t++;requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
